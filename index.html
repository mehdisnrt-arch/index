<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1f6f78">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Index Compteur Radio">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Index Compteur Radio</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Releve</p>
          <h1>Index Compteur Radio</h1>
        </div>
        <div class="header-actions">
          <button class="text-button" id="refreshButton" type="button">Actualiser</button>
          <button class="icon-button" id="exportButton" type="button" aria-label="Exporter Excel" title="Exporter Excel">
            <span aria-hidden="true">XLS</span>
          </button>
        </div>
      </header>

      <section class="entry-panel" aria-labelledby="entry-title">
        <h2 id="entry-title">Nouvel index</h2>

        <form id="readingForm" autocomplete="off" novalidate>
          <label for="dateInput">Date</label>
          <input id="dateInput" name="date" type="text" readonly>

          <label for="radioInput">Radio</label>
          <select id="radioInput" name="radio" required>
            <option value="">Choisir Radio</option>
            <option value="Aswat">Aswat</option>
            <option value="Med Radio">Med Radio</option>
            <option value="Medina FM">Medina FM</option>
            <option value="Medi1">Medi1</option>
            <option value="Cap Radio">Cap Radio</option>
            <option value="Chada FM">Chada FM</option>
            <option value="HIT RADIO">HIT RADIO</option>
            <option value="MFM">MFM</option>
          </select>

          <label for="indexInput">Index</label>
          <input id="indexInput" name="index" type="number" inputmode="decimal" min="0" step="0.001" required>

          <p class="status" id="statusMessage" role="status" aria-live="polite"></p>

          <button class="primary-button" type="submit">Enregistrer</button>
        </form>
      </section>

      <section class="summary-panel" id="adminPanel" aria-label="Administration">
        <div class="admin-lock">
          <label for="adminKeyInput">Code admin</label>
          <input id="adminKeyInput" name="adminKey" type="password" inputmode="text" autocomplete="current-password">
        </div>
        <div class="summary-row">
          <span>Total</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="summary-row">
          <span>Derniere synchro</span>
          <strong id="lastSync">-</strong>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Radio</th>
                <th>Index</th>
                <th>Ajoute</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>

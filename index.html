<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#003366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Index Radio">
  <title>Index Compteur Radio</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Centre émetteur de Figuig</p>
      <h1>Relevé compteur Radio</h1>
    </div>
    <div class="badge" id="todayBadge">--/--/----</div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Nouvelle lecture</h2>
      <form id="readingForm" autocomplete="off">
        <label for="dateDisplay">Date</label>
        <input id="dateDisplay" name="dateDisplay" type="text" readonly>
        <input id="date" name="date" type="hidden">

        <label for="radio">Radio</label>
        <select id="radio" name="radio" required>
          <option value="">Choisir radio</option>
        </select>

        <label for="indexValue">Index</label>
        <input id="indexValue" name="indexValue" type="number" inputmode="numeric" min="0" step="1" placeholder="Ex: 15240" required>

        <div id="previousInfo" class="hint">Dernier index: —</div>
        <div id="message" class="message" role="status" aria-live="polite"></div>

        <button type="submit" class="primary">Enregistrer</button>
      </form>
    </section>

    <section class="card actions-card">
      <h2>Fiche Excel</h2>
      <label for="search">Rechercher</label>
      <input id="search" type="search" placeholder="Date ou radio">
      <div class="button-row">
        <button id="exportFiche" type="button">Exporter fiche Excel</button>
        <button id="backupJson" type="button">Backup JSON</button>
      </div>
      <label class="import-label" for="importJson">Importer backup JSON</label>
      <input id="importJson" type="file" accept="application/json,.json">
      <button id="clearAll" type="button" class="danger ghost">Effacer tout</button>
    </section>

    <section class="card preview-card">
      <div class="section-title">
        <h2>Aperçu fiche</h2>
        <span class="mini">même structure que le fichier Excel</span>
      </div>
      <div class="sheet-preview" id="sheetPreview"></div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>Lectures enregistrées</h2>
        <span id="countBadge" class="count">0</span>
      </div>
      <div id="recordsList" class="records"></div>
      <p id="emptyState" class="empty">Aucune lecture enregistrée.</p>
    </section>
  </main>

  <footer class="footer">
    <span id="offlineStatus">Prêt</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
